name: Run daily market update

on:
  schedule:
    # GitHub schedules use UTC. These two slots cover 2:15 AM Pacific across
    # daylight-saving changes; the local-time guard runs only the correct one.
    - cron: "15 9,10 * * *"
  workflow_dispatch:

concurrency:
  group: daily-market-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Persist the daily market update
        env:
          MARKET_UPDATE_SECRET: ${{ secrets.MARKET_UPDATE_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(TZ=America/Los_Angeles date +%H)" != "02" ]; then
            echo "Skipping the daylight-saving fallback slot."
            exit 0
          fi

          if [ -z "$MARKET_UPDATE_SECRET" ]; then
            echo "Add MARKET_UPDATE_SECRET in GitHub repository Settings > Secrets and variables > Actions."
            exit 1
          fi

          curl --fail-with-body --silent --show-error --max-time 295 \
            --header "x-market-update-secret: $MARKET_UPDATE_SECRET" \
            https://rap-market-index.vercel.app/api/cron/daily-market-update
