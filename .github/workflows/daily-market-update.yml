name: Open daily release window

on:
  schedule:
    # These slots cover midnight Eastern across daylight and standard time.
    # The endpoint is idempotent, so later slots become recovery attempts and
    # return immediately after a successful release scan and market update.
    - cron: "7 4,5,6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-market-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Scan releases, update quotes, and reopen trading
        env:
          MARKET_UPDATE_SECRET: ${{ secrets.MARKET_UPDATE_SECRET }}
        run: |
          if [ -z "$MARKET_UPDATE_SECRET" ]; then
            echo "Add MARKET_UPDATE_SECRET in GitHub repository Settings > Secrets and variables > Actions."
            exit 1
          fi

          curl --fail-with-body --silent --show-error --max-time 295 \
            --retry 3 \
            --retry-delay 15 \
            --retry-all-errors \
            --header "x-market-update-secret: $MARKET_UPDATE_SECRET" \
            https://rap-market-index.vercel.app/api/cron/release-window
